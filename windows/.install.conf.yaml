- defaults:
    link:
      relink: true
      create: true
      force: true
      type: symlink
    shell:
      quiet: true

- clean: ["~", "~/.local/bin", "~\\AppData\\Roaming"]

- link:
    # Binaries
    ~/.local/bin:
      glob: true
      path: windows/bin/*

    # Shell
    ~/Documents/PowerShell:
      glob: true
      path: config/powershell/*

    ~/.config/git: config/git
    # ~\AppData\Roaming\bottom: config/bottom
    ~\AppData\Roaming\yazi\config: config/yazi
    ~\AppData\Roaming\bat: config/bat

- create:
    - ~/Dev
    - ~/Tmp
