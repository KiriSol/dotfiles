- defaults:
    link:
      relink: true
      create: true
      force: true
      type: symlink

- clean:
    ["~", "~/.config", "~/.local/bin", "~/AppData/Local", "~/AppData/Roaming"]

- link:
    # Binaries
    ~/.local/bin/:
      path: bin/*
      glob: true

    # Configs
    ~/.config/git: config/git
    ~/AppData/Roaming/bat: config/bat
    ~/AppData/Roaming/yazi/config: config/yazi

- create:
    - ~/Dev
    - ~/Tmp
