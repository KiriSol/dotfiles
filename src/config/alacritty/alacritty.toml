[general]
import = ["themes/catppuccin-frappe.toml"]

[window]
dynamic_padding = true
opacity = 0.8

[window.padding]
x = 3
y = 3

[window.dimensions]
columns = 120
lines = 32

[colors]
draw_bold_text_with_bright_colors = true

[font]
size = 13
normal = { family = "JetBrainsMono Nerd Font" }

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true
