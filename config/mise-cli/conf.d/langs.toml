### Languages

[settings]
npm.package_manager = "bun"
pipx.uvx = true
python.uv_venv_auto = true

[tools]

# Rust
rust = "latest"

# Lua
lua = "latest"
stylua = "latest"
"aqua:Kampfkarren/selene" = "latest"
lua-language-server = "latest"

# GO
go = "latest"
"go:golang.org/x/tools/gopls" = "latest"

# Zig/C/C++
zig = "latest"
"github:zigtools/zls" = "latest"

# Python
uv = "latest"
python = { version = "latest", venv_backend = "uv" }
ruff = "latest"
ty = "latest"

# JS/TS
bun = "latest"
biome = "latest"

# Typst
typst = "latest"
typstyle = "latest"
tinymist = "latest"

shfmt = "latest" # Shell
taplo = "latest" # Toml

# Spell
typos = "latest"
